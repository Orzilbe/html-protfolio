<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Or Zilberberg</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fefaf6;
            color: #4a4a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .contact-card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            margin-bottom: 30px;
            color: #5d5d5d;
        }
        .info-item {
            margin-bottom: 20px;
        }
        .info-item p {
            margin: 5px 0;
            color: #7d7d7d;
        }
        .btn-contact {
            display: block;
            background-color: #d1e9f6;
            color: #4682a9;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn-contact:hover {
            transform: scale(1.02);
            background-color: #b9dff2;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: #ccc;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #7d7d7d; }
    </style>
</head>
<body>

<div class="contact-card">
    <h1>Let's Connect</h1>
    
    <div class="info-item">
        <p><strong>Email</strong></p>
        <a href="mailto:orzilbe@gmail.com" class="btn-contact">orzilbe@gmail.com</a>
    </div>

    <div class="info-item">
        <p><strong>LinkedIn</strong></p>
        <a href="https://www.linkedin.com/in/orzilberberg/" target="_blank" class="btn-contact">View Profile</a>
    </div>

    <div class="info-item">
        <p><strong>Location</strong></p>
        <p>Israel</p>
    </div>

    <a href="../index.html" class="back-link">← Back to Portfolio</a>
</div>

</body>
</html>
